name: Resuable Deploy
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact to deploy'
        required: false
        default: dist
        type: string
    outputs:
      result:
        description: 'Information about the deployment'
        value: $ {{ jobs.deploy.outputs.outcome }}
    # secrets:
    #   some-secret:
    #     required: false
jobs:
  deploy: 
    outputs:
      outcome: ${{ steps.set-result.outputs.result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls  
      - name: Output Information
        run: echo "This is a reusable workflow for deployment"
      - name: Set result output 
        id: set-result
        run: echo "result=Deployment successful" >> $GITHUB_OUTPUT
